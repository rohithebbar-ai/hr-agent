services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: hr-copilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  localstack:
    image: localstack/localstack:4.14.0
    container_name: hr-copilot-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3, secretsmanager, sqs
      - DEBUG=0
      - DEFAULT_REGION=us-east-1
    volumes:
      - ./localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  localstack_data: