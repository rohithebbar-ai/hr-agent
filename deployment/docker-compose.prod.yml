services:
  app:
    image: rohithebbar/hr-agent:latest
    container_name: hr-copilot-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=prod
      - AWS_REGION=ap-south-1
      - AWS_SECRET_NAME=hragent/api-keys
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hr-network

  ingestion-worker:
    image: rohithebbar/hr-agent:latest
    container_name: hr-copilot-worker
    command: ["uv", "run", "python", "-m", "rag.worker"]
    environment:
      - ENVIRONMENT=prod
      - AWS_REGION=ap-south-1
      - AWS_SECRET_NAME=hragent/api-keys
      - REDIS_URL=redis://redis:6379/0
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - hr-network

  discord-bot:
    image: rohithebbar/hr-agent:latest
    container_name: hr-copilot-discord
    command: ["sh", "-c", "uv run python scripts/aws_secrets.py && uv run python -m integrations.discord_bot"]
    environment:
      - AWS_REGION=ap-south-1
      - AWS_SECRET_NAME=hragent/api-keys
      - API_BASE_URL=http://app:8000
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - hr-network

  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - hr-network

  nginx:
    image: nginx:alpine
    container_name: hr-copilot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - hr-network

volumes:
  redis_data:

networks:
  hr-network:
    driver: bridge