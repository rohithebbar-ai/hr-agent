services:
  app:
    build:
        context: ..
        dockerfile: deployment/Dockerfile
    container_name: hr-copilot-app
    ports:
        - "8000:8000"
    env_file:
        - ../.env
    environment:
        - QDRANT_URL=http://qdrant:6333
        - REDIS_URL=redis://redis:6379/0
    depends_on:
        qdrant:
            condition: service_started
        redis:
            condition: service_healthy
    restart: unless-stopped
    networks:
        - hr-network
  discord-bot:
    build:
        context: ..
        dockerfile: deployment/Dockerfile
    container_name: hr-copilot-discord
    command: ["uv", "run", "python", "-m", "integrations.discord_bot"]
    env_file:
        - ../.env
    environment:
        - API_BASE_URL=http://app:8000
    depends_on:
        - app
    restart: unless-stopped
    networks:
        - hr-network

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: hr-copilot-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - hr-network

  redis:
    image: redis:7-alpine
    container_name: hr-copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - hr-network

  nginx:
    image: nginx:alpine
    container_name: hr-copilot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - hr-network

volumes:
    qdrant_data:
    redis_data:

networks:
  hr-network:
    driver: bridge


