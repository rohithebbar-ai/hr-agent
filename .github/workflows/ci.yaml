name: hrassistant CI/CD

on:
  push:
    branches: [main, dev]

env:
  DOCKER_IMAGE: rohithebbar/hr-agent

jobs:

  # ── Stage 1: Lint ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # ── Stage 2: Unit Tests ────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: |
          uv run pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_regression.py
        env:
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LANGSMITH_TRACING: "false"
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          ENVIRONMENT: test

  # ── Stage 3: Integration Tests ─────────────────────────────────────
  # Uses Qdrant Cloud directly — no local Qdrant container needed
  # Only runs on pushes to main (not dev)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest tests/test_integration.py -v --tb=short
        env:
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LANGSMITH_TRACING: "false"
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          ENVIRONMENT: test

  # ── Stage 4: Regression Tests ──────────────────────────────────────
  # Quality gate — blocks deploy if answer quality degrades
  # Only runs on main after integration tests pass
  regression:
    name: Regression Tests (Quality Gate)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run regression tests
        run: uv run pytest tests/test_regression.py -v --tb=short -m regression
        env:
          REDIS_URL: redis://localhost:6379/0
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LANGSMITH_TRACING: "false"
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          ENVIRONMENT: test

  # ── Stage 5: Build + Push Docker ───────────────────────────────────
  # Only runs on main after all tests pass
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: regression
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_NAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 6: Deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Syncing code from GitHub ==="
            cd ~/hr-agent
            git fetch origin main
            git reset --hard origin/main

            echo "=== Starting deployment ==="
            cd ~/hr-agent/deployment

            # Tag current image as rollback before pulling new
            docker tag rohithebbar/hr-agent:latest rohithebbar/hr-agent:rollback 2>/dev/null || echo "No image to tag as rollback"

            # Pull new image from Docker Hub
            echo "=== Pulling new image ==="
            docker compose -f docker-compose.prod.yml pull app discord-bot

            # Restart containers with new image
            echo "=== Restarting containers ==="
            docker compose -f docker-compose.prod.yml up -d app discord-bot

            # Wait for app startup — models load on first request, not startup
            echo "=== Waiting for startup ==="
            sleep 60

            # Restart Nginx so it reconnects to the new app container
            echo "=== Restarting Nginx ==="
            docker restart hr-copilot-nginx
            sleep 10

            # Health check via Nginx
            echo "=== Running health check ==="
            if curl -sf http://localhost/api/v1/health > /dev/null; then
              echo "=== Deployment successful ==="
              docker image prune -f
              docker images rohithebbar/hr-agent --format "{{.Tag}}" | \
                grep -v "latest" | grep -v "rollback" | \
                xargs -I {} docker rmi rohithebbar/hr-agent:{} 2>/dev/null || true
              echo "=== Cleanup complete ==="
            else
              echo "=== Health check FAILED — rolling back ==="
              docker tag rohithebbar/hr-agent:rollback rohithebbar/hr-agent:latest
              docker compose -f docker-compose.prod.yml up -d app discord-bot
              sleep 20
              docker restart hr-copilot-nginx
              echo "=== Rollback complete ==="
              exit 1
            fi